record_irrigation:
  fields:
    zone:
      required: true
      selector:
        select:
          options:
            - "zone_1"
            - "zone_2"
    source:
      required: true
      selector:
        select:
          options:
            - "rainwater_tank"
            - "mains_water"
    duration_minutes:
      required: true
      selector:
        number:
          min: 0.1
          max: 15
          step: 0.1
          unit_of_measurement: min
    notes:
      required: false
      selector:
        text:
    idempotency_key:
      required: false
      selector:
        text:
